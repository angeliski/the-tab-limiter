name: Validate Extension

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Validate manifest.json
        run: |
          echo "Validating manifest.json..."
          if [ ! -f "manifest.json" ]; then
            echo "❌ manifest.json not found"
            exit 1
          fi
          
          # Check if manifest.json is valid JSON
          if ! python3 -m json.tool manifest.json > /dev/null 2>&1; then
            echo "❌ manifest.json is not valid JSON"
            exit 1
          fi
          
          echo "✅ manifest.json is valid"
      
      - name: Check required files
        run: |
          echo "Checking required files..."
          required_files=(
            "manifest.json"
            "background.js"
            "options.html"
            "options.js"
            "options.css"
            "icons/48.png"
            "icons/128.png"
          )
          
          missing_files=()
          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              missing_files+=("$file")
              echo "❌ Missing: $file"
            else
              echo "✅ Found: $file"
            fi
          done
          
          if [ ${#missing_files[@]} -ne 0 ]; then
            echo ""
            echo "❌ Missing required files: ${missing_files[*]}"
            exit 1
          fi
          
          echo ""
          echo "✅ All required files present"
      
      - name: Check manifest version
        run: |
          echo "Checking manifest version..."
          MANIFEST_VERSION=$(grep '"manifest_version"' manifest.json | sed 's/.*"manifest_version": \([0-9]*\).*/\1/')
          
          if [ "$MANIFEST_VERSION" != "3" ]; then
            echo "❌ Manifest version should be 3 (found: $MANIFEST_VERSION)"
            exit 1
          fi
          
          echo "✅ Manifest version 3 confirmed"
      
      - name: Test ZIP creation
        run: |
          echo "Testing ZIP creation..."
          zip -r test-build.zip . \
            -x "*.git*" \
            -x ".github/*" \
            -x "docs/*" \
            -x "*.md" \
            -x "node_modules/*" \
            -x "*.zip" \
            -x ".DS_Store" \
            -x "Thumbs.db" \
            -x "*.log"
          
          # Check ZIP size (should be less than 10MB for Chrome Web Store)
          ZIP_SIZE=$(stat -c%s test-build.zip)
          ZIP_SIZE_MB=$((ZIP_SIZE / 1024 / 1024))
          
          if [ $ZIP_SIZE -gt 10485760 ]; then
            echo "⚠️ Warning: ZIP file is larger than 10MB ($ZIP_SIZE_MB MB)"
            echo "Consider optimizing assets or removing unnecessary files"
          else
            echo "✅ ZIP size is acceptable ($ZIP_SIZE_MB MB)"
          fi
          
          # Verify ZIP integrity
          if unzip -t test-build.zip > /dev/null 2>&1; then
            echo "✅ ZIP file integrity verified"
          else
            echo "❌ ZIP file integrity check failed"
            exit 1
          fi
      
      - name: Summary
        run: |
          echo "======================================"
          echo "        Extension Validation Pass      "
          echo "======================================"
          echo "✅ All checks passed successfully!"
          echo ""
          echo "The extension is ready for:"
          echo "- Testing locally"
          echo "- Creating a release"
          echo "- Publishing to Chrome Web Store"